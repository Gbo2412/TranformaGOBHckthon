version: "3.9"

services:
  frontend:
    build: ../../frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001

  backend:
    build: ../../backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MOCK_DATA_PATH=/app/data/mock
